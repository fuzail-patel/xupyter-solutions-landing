<!DOCTYPE html><html><body style="font-family:sans-serif;max-width:560px;margin:0 auto;border:1px solid #eee;border-radius:12px;overflow:hidden;">
  <div style="padding:24px 28px;display:flex;justify-content:space-between;align-items:center;">
    <strong>YourBrand</strong>
    <span style="background:#f0faf4;color:#1b5e20;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;text-transform:uppercase;">Quote Request</span>
  </div>
  <div style="padding:0 28px 20px;">
    <h2 style="font-size:20px;margin:0 0 6px;">New quote request!</h2>
    <p style="color:#666;font-size:13px;margin:0;">A potential client submitted a quote request.</p>
  </div>
  <hr style="border:none;border-top:1px solid #eee;margin:0 28px;">
  <table style="width:100%;padding:16px 28px;border-spacing:0;">
    <tr><td style="padding:8px 0;color:#999;font-size:11px;text-transform:uppercase;width:110px;">Name</td><td style="font-size:13px;font-weight:500;">{{name}}</td></tr>
    <tr><td style="padding:8px 0;color:#999;font-size:11px;text-transform:uppercase;">Email</td><td style="font-size:13px;font-weight:500;">{{email}}</td></tr>
    <tr><td style="padding:8px 0;color:#999;font-size:11px;text-transform:uppercase;">Company Size</td><td style="font-size:13px;font-weight:500;">{{company_size}}</td></tr>
    <tr><td style="padding:8px 0;color:#999;font-size:11px;text-transform:uppercase;">Budget</td><td style="font-size:13px;font-weight:500;">{{budget}}</td></tr>
  </table>
  <div style="margin:0 28px;background:#f5f5f5;padding:14px;border-radius:8px;font-size:13px;color:#333;">
    <div style="color:#999;font-size:11px;text-transform:uppercase;margin-bottom:6px;">Message</div>
    {{message}}
  </div>
  <div style="margin:16px 28px 24px;background:#f0faf4;padding:14px;border-radius:8px;color:#1b5e20;font-size:12px;">
    Follow up within 24 hours to maximize conversion.
  </div>
</body></html>
